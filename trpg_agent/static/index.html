<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRPG 多智能体跑团</title>
<style>
  :root {
    --bg: #0d0d0d;
    --panel: #1a1a1a;
    --border: #2a2a2a;
    --text: #c8c0b8;
    --accent: #8b4513;
    --kp-color: #b8a080;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', 'Noto Serif SC', serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* ── 顶部控制栏 ── */
  #controls {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  #controls button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 20px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 3px;
    font-family: inherit;
  }
  #controls button:disabled { opacity: 0.4; cursor: not-allowed; }
  #controls button.running { background: #555; }
  #controls label { font-size: 12px; color: #888; }
  #controls input, #controls select {
    background: #222;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    font-size: 12px;
    border-radius: 3px;
    font-family: inherit;
  }
  #status { font-size: 12px; color: #888; margin-left: auto; }
  /* ── 主布局 ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  /* ── 左侧角色面板 ── */
  #sidebar {
    width: 260px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .char-card {
    background: #141414;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 12px;
    transition: border-color 0.3s;
  }
  .char-card.active { border-color: var(--accent); }
  .char-name {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 8px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 4px;
  }
  .stat-label { color: #888; }
  .stat-bar-bg {
    height: 6px;
    background: #222;
    border-radius: 3px;
    margin-bottom: 6px;
    overflow: hidden;
  }
  .stat-bar-fg {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease, background 0.5s ease;
  }
  .hp-bar { background: #c0392b; }
  .san-bar { background: #2980b9; }
  .inv-list {
    font-size: 11px;
    color: #777;
    margin-top: 6px;
    line-height: 1.5;
  }
  .conditions {
    font-size: 11px;
    color: #c0392b;
    margin-top: 4px;
  }
  /* ── 中央对话区 ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    max-width: 85%;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .msg-header {
    font-size: 11px;
    font-weight: bold;
    margin-bottom: 4px;
    opacity: 0.7;
  }
  .msg-body {
    font-size: 14px;
    line-height: 1.7;
    padding: 12px 16px;
    border-radius: 8px;
  }
  .msg-kp .msg-body {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-left: 3px solid var(--kp-color);
  }
  .msg-player .msg-body {
    background: #141414;
    border: 1px solid #252525;
    border-left: 3px solid var(--player-color, #555);
  }
  .msg-dice {
    align-self: center;
    background: #1a1008;
    border: 1px solid #3a2810;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    color: #d4a040;
    text-align: center;
    animation: fadeIn 0.5s ease;
  }
  /* ── 骰子动画 ── */
  .dice-rolling {
    font-size: 28px;
    animation: diceSpin 0.6s ease-out;
  }
  @keyframes diceSpin {
    0% { transform: rotate(0deg) scale(0.5); opacity: 0; }
    50% { transform: rotate(180deg) scale(1.3); }
    100% { transform: rotate(360deg) scale(1); opacity: 1; }
  }
  /* ── 进度条 ── */
  #progress {
    height: 3px;
    background: #222;
    flex-shrink: 0;
  }
  #progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
  }
  /* ── 响应式 ── */
  @media (max-width: 700px) {
    #sidebar { width: 200px; padding: 10px; }
    .msg { max-width: 95%; }
  }
</style>
</head>
<body>

<div id="controls">
  <button id="btn-start" onclick="startGame()">▶ 开始跑团</button>
  <label>KP</label>
  <select id="kp-model"><option>gemma4:12b</option></select>
  <label>玩家</label>
  <select id="player-model"><option>ornith:9b</option></select>
  <label>轮数</label>
  <input id="turns" type="number" value="12" min="3" max="30" style="width:50px">
  <span id="status">就绪</span>
</div>

<div id="main">
  <div id="sidebar">
    <div class="char-card" id="card-陈明">
      <div class="char-name" style="color:#4a90d9">🕵️ 陈明</div>
      <div class="stat-row"><span class="stat-label">HP</span><span id="hp-陈明">12/12</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fg hp-bar" id="hpbar-陈明" style="width:100%"></div></div>
      <div class="stat-row"><span class="stat-label">SAN</span><span id="san-陈明">60/60</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fg san-bar" id="sanbar-陈明" style="width:100%"></div></div>
      <div class="inv-list">🎒 手电筒 · 警徽 · .38左轮</div>
    </div>
    <div class="char-card" id="card-林晓">
      <div class="char-name" style="color:#50c878">🔬 林晓</div>
      <div class="stat-row"><span class="stat-label">HP</span><span id="hp-林晓">10/10</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fg hp-bar" id="hpbar-林晓" style="width:100%"></div></div>
      <div class="stat-row"><span class="stat-label">SAN</span><span id="san-林晓">70/70</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fg san-bar" id="sanbar-林晓" style="width:100%"></div></div>
      <div class="inv-list">🎒 急救包 · 笔记本 · 相机</div>
    </div>
    <div class="char-card" id="card-王刚">
      <div class="char-name" style="color:#e07050">💪 王刚</div>
      <div class="stat-row"><span class="stat-label">HP</span><span id="hp-王刚">15/15</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fg hp-bar" id="hpbar-王刚" style="width:100%"></div></div>
      <div class="stat-row"><span class="stat-label">SAN</span><span id="san-王刚">40/40</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fg san-bar" id="sanbar-王刚" style="width:100%"></div></div>
      <div class="inv-list">🎒 棒球棍 · 打火机 · 香烟</div>
    </div>
  </div>
  <div id="chat">
    <div style="text-align:center; color:#555; margin-top:100px; font-size:14px;">
      点击「开始跑团」启动 AI 主持人<br>
      <span style="font-size:12px; color:#444;">gemma4:12b KP · ornith:9b 玩家 · COC 7版规则</span>
    </div>
  </div>
</div>

<div id="progress"><div id="progress-bar"></div></div>

<script>
let es = null;
let totalTurns = 12;
let currentTurn = 0;

function startGame() {
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-start').textContent = '⏳ 运行中...';
  document.getElementById('btn-start').classList.add('running');
  document.getElementById('status').textContent = '连接中...';
  document.getElementById('chat').innerHTML = '';
  document.getElementById('progress-bar').style.width = '0%';
  currentTurn = 0;
  totalTurns = parseInt(document.getElementById('turns').value) || 12;

  const kp = document.getElementById('kp-model').value;
  const player = document.getElementById('player-model').value;
  const host = 'http://192.168.0.108:11434';

  es = new EventSource(`/api/stream?host=${encodeURIComponent(host)}&kp=${encodeURIComponent(kp)}&player=${encodeURIComponent(player)}&turns=${totalTurns}`);

  es.onmessage = (e) => {
    const data = JSON.parse(e.data);
    switch (data.type) {
      case 'status':
        document.getElementById('status').textContent = data.text;
        break;
      case 'init':
        document.getElementById('status').textContent = '游戏开始';
        break;
      case 'player_action':
        addMessage('player', data.speaker, data.text, data.color);
        highlightCard(data.speaker);
        break;
      case 'dice_roll':
        addDice(data.speaker, data.text);
        break;
      case 'kp_narration':
        addMessage('kp', 'KP', data.text);
        currentTurn++;
        document.getElementById('progress-bar').style.width = (currentTurn / totalTurns * 100) + '%';
        if (data.state) updateState(data.state);
        break;
      case 'done':
        addMessage('kp', '📋 终局', data.summary.replace(/\n/g, '<br>'));
        document.getElementById('status').textContent = '完成 ✓';
        document.getElementById('btn-start').disabled = false;
        document.getElementById('btn-start').textContent = '▶ 重新开始';
        document.getElementById('btn-start').classList.remove('running');
        es.close();
        break;
    }
  };

  es.onerror = () => {
    document.getElementById('status').textContent = '连接断开';
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-start').textContent = '▶ 重新开始';
    document.getElementById('btn-start').classList.remove('running');
  };
}

function addMessage(type, speaker, text, color) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg msg-${type}`;
  if (color) div.style.setProperty('--player-color', color);
  div.innerHTML = `<div class="msg-header">${speaker}</div><div class="msg-body">${text}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addDice(speaker, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg-dice';
  div.innerHTML = `<span class="dice-rolling">🎲</span> ${speaker} · ${text}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function highlightCard(name) {
  document.querySelectorAll('.char-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-' + name);
  if (card) card.classList.add('active');
}

function updateState(state) {
  for (const [name, s] of Object.entries(state)) {
    const hpEl = document.getElementById('hp-' + name);
    const sanEl = document.getElementById('san-' + name);
    const hpBar = document.getElementById('hpbar-' + name);
    const sanBar = document.getElementById('sanbar-' + name);
    if (hpEl) hpEl.textContent = `${s.hp}/${s.max_hp}`;
    if (sanEl) sanEl.textContent = `${s.san}/${s.max_san}`;
    if (hpBar) hpBar.style.width = (s.hp / s.max_hp * 100) + '%';
    if (sanBar) sanBar.style.width = (s.san / s.max_san * 100) + '%';
    // HP 低时变色
    if (hpBar) {
      const pct = s.hp / s.max_hp;
      hpBar.style.background = pct > 0.5 ? '#c0392b' : pct > 0.25 ? '#e67e22' : '#e74c3c';
    }
  }
}
</script>
</body>
</html>
